name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-skills:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF_VAR: ${{ github.ref }}
      EVENT_NAME: ${{ github.event_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_VAR#refs/tags/v}"
          ver="$(cat VERSION)"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match VERSION ($ver)"
            exit 1
          fi

      - name: Build skill archives
        run: bash scripts/build-skills.sh

      - name: List built archives
        run: ls -la dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_VAR#refs/tags/}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes --draft
          fi
          gh release upload "$tag" dist/*.zip --clobber

      - name: Upload artifacts (non-tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: dist/*.zip
